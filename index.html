<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dan's Rentals — Landlord Dashboard. Manage room vacancies, update statuses, and share availability with tenants.">
  <title>Dan's Rentals — Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="pb-8">

  <!-- ===== HEADER ===== -->
  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-5xl mx-auto flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-600 flex items-center justify-center text-white font-bold text-lg shadow-md">D</div>
        <div>
          <h1 class="text-lg font-bold text-gray-900 leading-tight">Dan's Rentals</h1>
          <p class="text-xs text-gray-500 flex items-center gap-1.5"><span class="pulse-dot"></span> Manage rooms in real time</p>
        </div>
      </div>
      <div class="w-10 h-10 rounded-full bg-teal-50 border-2 border-teal-200 flex items-center justify-center text-teal-700 font-semibold text-sm">LM</div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 pt-6">

    <!-- ===== STATS ===== -->
    <section id="statsSection" class="flex gap-3 overflow-x-auto pb-2 mb-6 scrollbar-hide" style="-webkit-overflow-scrolling:touch">
      <!-- filled by JS -->
    </section>

    <!-- ===== FILTERS ===== -->
    <section class="flex gap-2 overflow-x-auto pb-2 mb-5" style="-webkit-overflow-scrolling:touch">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="vacant" onclick="setFilter('vacant')">🟢 Vacant</button>
      <button class="filter-btn" data-filter="occupied" onclick="setFilter('occupied')">🔴 Occupied</button>
      <button class="filter-btn" data-filter="reserved" onclick="setFilter('reserved')">🟡 Reserved</button>
    </section>

    <!-- ===== ROOM GRID ===== -->
    <section id="roomGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
      <!-- filled by JS -->
    </section>

    <!-- ===== QR CODE ===== -->
    <section class="qr-section mb-6 fade-in">
      <p class="text-sm font-medium opacity-80 mb-1">Share With Tenants</p>
      <h2 class="text-xl font-bold mb-4">Scan to Check Availability</h2>
      <div id="qrCode" class="inline-block mb-4"></div>
      <p class="text-sm opacity-70 mb-4 max-w-xs mx-auto">Tenants can scan this QR code to check room availability instantly.</p>
      <div class="flex flex-wrap justify-center gap-2">
        <button onclick="downloadQR()" class="btn-action btn-primary bg-white/20 hover:bg-white/30 backdrop-blur text-white border border-white/30">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>
          Download QR
        </button>
        <button onclick="copyTenantLink()" class="btn-action btn-primary bg-white/20 hover:bg-white/30 backdrop-blur text-white border border-white/30">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
          Copy Link
        </button>
      </div>
    </section>
  </main>

  <!-- ===== MODAL ===== -->
  <div id="roomModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <div id="modalBody">
        <!-- filled by JS -->
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast"></div>

  <script src="rooms.js"></script>
  <script src="app.js"></script>
</body>
</html>
